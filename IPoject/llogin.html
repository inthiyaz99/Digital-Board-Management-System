<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Digital Board</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- SAME CSS AS HOME -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e5e7eb;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-around;
            background: rgba(2, 6, 23, 0.95);
            padding: 16px 0;
            border-bottom: 1px solid #1f2937;
        }

        .navbar a {
            text-decoration: none;
            text-align: center;
            color: #cbd5f5;
        }

        .navbar i {
            font-size: 30px;
            display: block;
            margin-bottom: 6px;
            color: #22d3ee;
        }

        /* LOGIN BOX */
        .box {
            width: 400px;
            max-width: 90%;
            margin: 80px auto;
            background: #020617;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 0 40px rgba(99,102,241,0.25);
        }

        .box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #e0e7ff;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #1f2937;
            background: #020617;
            color: #e5e7eb;
            outline: none;
        }

        input:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 1px #22d3ee;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #6366f1, #22d3ee);
            color: #020617;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="index.html">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </a>
</nav>

<!-- LOGIN FORM -->
<div class="box">
    <h2>User Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- LOGIN + LOGOUT LOGIC -->
<script>
    function login() {
        let u = document.getElementById("username").value;
        let p = document.getElementById("password").value;

        if (u && p) {
            localStorage.setItem("loggedIn", "true");
            localStorage.setItem("user", u);
            alert("Login Successful");
            window.location.href = "index.html";
        } else {
            alert("Please enter username and password");
        }
    }

    function logout() {
        localStorage.clear();
        alert("Logged out successfully");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
